logger:
  enable: true
  pretty_backtrace: false
  level: info
  format: json

server:
  binding: 0.0.0.0
  host: https://api.example.com
  port: 5150

database:
  uri: postgres://rustok:CHANGE_ME@db.example.com:5432/rustok_production
  enable_logging: false
  connect_timeout: 500
  idle_timeout: 500
  min_connections: 5
  max_connections: 30
  auto_migrate: false

auth:
  jwt:
    secret: CHANGE_ME_WITH_A_REAL_PRODUCTION_SECRET
    expiration: 3600

settings:
  auth:
    refresh_expiration: 1209600
    issuer: rustok
    audience: rustok-admin
  rustok:
    tenant:
      enabled: true
      resolution: header
      header_name: X-Tenant-ID
      default_id: 00000000-0000-0000-0000-000000000001
    features:
      registration_enabled: true
      email_verification: true
      multi_tenant: true
      search_indexing: true
      oauth_enabled: true
    rate_limit:
      enabled: true
      backend: redis
      redis_key_prefix: rate-limit:v1
      requests_per_minute: 60
      burst: 10
      auth_requests_per_minute: 20
      auth_burst: 5
      oauth_requests_per_minute: 30
      oauth_burst: 5
      trusted_auth_dimensions: true
    runtime:
      guardrails:
        rollout: observe
        rate_limit_memory_thresholds:
          api_warning_entries: 5000
          api_critical_entries: 20000
          auth_warning_entries: 1000
          auth_critical_entries: 5000
          oauth_warning_entries: 1000
          oauth_critical_entries: 5000
    events:
      transport: outbox
      relay_target: iggy
      allow_relay_target_fallback: false
      relay_interval_ms: 1000
      channel_capacity: 512
      backpressure:
        enabled: true
        max_queue_depth: 10000
        warning_threshold: 0.7
        critical_threshold: 0.9

# Redis runtime is resolved from environment, not from this YAML.
# Set one of:
# - RUSTOK_REDIS_URL=redis://redis.example.com:6379/0
# - REDIS_URL=redis://redis.example.com:6379/0
#
# Recommended rollout:
# 1. deploy with runtime.guardrails.rollout=observe
# 2. verify /health/runtime and /metrics
# 3. switch rollout to enforce after backend stability is confirmed
