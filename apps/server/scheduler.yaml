# RusTok background scheduler
#
# Run with:
#   cargo loco scheduler
#
# Cron expression format:
#   sec  min  hour  day-of-month  month  day-of-week  [year]
#
# All tasks map to `cargo loco task --name <name>`.

jobs:
  # Remove expired sessions every hour.
  cleanup_sessions:
    run: "cleanup sessions"
    schedule: "0 0 * * * *"
    tags:
      - maintenance

  # Purge media records whose storage object is missing (daily at 03:00 UTC).
  media_cleanup:
    run: "media_cleanup"
    schedule: "0 0 3 * * *"
    tags:
      - maintenance
      - media

  # Rebuild any stale search index entries (every 6 hours).
  rebuild_index:
    run: "rebuild index"
    schedule: "0 0 */6 * * *"
    tags:
      - search
