[package]
name = "rustok-seo-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-seo module"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
    "leptos/ssr",
    "dep:leptos_axum",
    "dep:loco-rs",
    "dep:rustok-core",
    "dep:rustok-tenant",
    "dep:sea-orm",
]

[dependencies]
async-graphql.workspace = true
leptos.workspace = true
leptos-auth.workspace = true
leptos-ui-routing.workspace = true
leptos_axum = { workspace = true, optional = true }
loco-rs = { workspace = true, optional = true }
rustok-api = { workspace = true, default-features = false }
rustok-core = { workspace = true, optional = true }
rustok-seo = { path = "..", default-features = false }
rustok-seo-targets = { path = "../rustok-seo-targets", default-features = false }
rustok-tenant = { workspace = true, optional = true }
sea-orm = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
uuid.workspace = true

[dev-dependencies]
chrono.workspace = true
tokio.workspace = true

[package.metadata.cargo-udeps.ignore]
normal = ["leptos-auth"]
