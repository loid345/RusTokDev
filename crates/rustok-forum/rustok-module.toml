[module]
slug = "forum"
name = "Forum"
version = "0.1.0"
description = "Forum categories, topics, replies, and moderation workflows"
ownership = "first_party"
trust_level = "verified"
ui_classification = "dual_surface"
recommended_admin_surfaces = ["leptos-admin"]

[marketplace]
category = "content"
tags = ["community", "content", "discussions"]

[dependencies]
content = { version_req = ">=0.1.0" }
taxonomy = { version_req = ">=0.1.0" }

[dependencies.page_builder]
version_req = ">=0.1.0"
module = "page-builder"
contract = "grapesjs_v1"
contract_version = "1.0"

[crate]
entry_type = "ForumModule"

[provides.graphql]
query = "graphql::ForumQuery"
mutation = "graphql::ForumMutation"

[provides.http]
routes = "controllers::routes"

[provides.admin_ui]
leptos_crate = "rustok-forum-admin"
route_segment = "forum"
nav_label = "Forum"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[provides.storefront_ui]
leptos_crate = "rustok-forum-storefront"
slot = "home_after_catalog"
route_segment = "forum"
page_title = "Forum"

[provides.storefront_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "storefront/locales"

[[provides.admin_ui.child_pages]]
subpath = "topics"
title = "Forum Topics"
nav_label = "Topics"

[[provides.admin_ui.child_pages]]
subpath = "categories"
title = "Forum Categories"
nav_label = "Categories"

[fba.builder_consumer]
provider_module = "page-builder"
contract = "grapesjs_v1"
contract_version = "1.0"
builder_contract_version = "1.0"
consumer_min_version = "1.0"
catalog_version = "v1"
capabilities = ["preview", "tree", "properties", "publish"]

[fba.builder_consumer.error_mapping]
validation = "forum.widget.validation"
sanitize = "forum.widget.sanitize"
rbac = "forum.widget.rbac"
runtime = "forum.widget.runtime"

[[fba.builder_consumer.compatibility_matrix]]
provider_contract_version = "1.0"
consumer_min_version = "1.0"

[fba.builder_consumer.widgets.topic_list]
data_contract_version = "1.0"
props_schema = "forum.topic_list.v1"
capability_requirements = ["preview"]
fallback_mode = "readonly"

[fba.builder_consumer.widgets.topic_detail]
data_contract_version = "1.0"
props_schema = "forum.topic_detail.v1"
capability_requirements = ["preview", "moderation_view"]
fallback_mode = "degraded"

[fba.builder_consumer.widgets.reply_stream]
data_contract_version = "1.0"
props_schema = "forum.reply_stream.v1"
capability_requirements = ["preview", "moderation_view"]
fallback_mode = "hidden"

[fba.builder_consumer.degraded_modes]
builder_disabled = "forum_widgets_readonly_keep_forum_routes"
preview_disabled = "forum_widget_preview_hidden_keep_forum_routes"
publish_disabled = "forum_widget_publish_feature_disabled_keep_forum_routes"

[fba.builder_consumer.toggle_profiles]
all_on = [
  "builder.enabled=true",
  "builder.preview.enabled=true",
  "builder.properties.enabled=true",
  "builder.publish.enabled=true",
  "builder.legacy_bridge_readonly=true",
]
publish_off = [
  "builder.enabled=true",
  "builder.preview.enabled=true",
  "builder.properties.enabled=true",
  "builder.publish.enabled=false",
  "builder.legacy_bridge_readonly=true",
]
preview_off = [
  "builder.enabled=true",
  "builder.preview.enabled=false",
  "builder.properties.enabled=true",
  "builder.publish.enabled=false",
  "builder.legacy_bridge_readonly=true",
]
builder_off = [
  "builder.enabled=false",
  "builder.preview.enabled=false",
  "builder.properties.enabled=false",
  "builder.publish.enabled=false",
  "builder.legacy_bridge_readonly=true",
]
