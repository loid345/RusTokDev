[module]
slug = "pages"
name = "Pages"
version = "0.1.0"
description = "Static pages, blocks and menus"
ownership = "first_party"
trust_level = "verified"
ui_classification = "dual_surface"
recommended_admin_surfaces = ["leptos-admin"]

[marketplace]
category = "content"
tags = ["cms", "content", "landing-pages"]

[dependencies]
content = { version_req = ">=0.1.0" }

[dependencies.page_builder]
module = "page-builder"
version_req = ">=0.1.0"
mode = "capability_provider"
required_capabilities = ["preview", "tree", "properties", "publish"]
contract = "grapesjs_v1"
contract_version = "1.0"

[crate]
entry_type = "PagesModule"

[provides.graphql]
query = "graphql::PagesQuery"
mutation = "graphql::PagesMutation"

[provides.http]
routes = "controllers::routes"

[provides.admin_ui]
leptos_crate = "rustok-pages-admin"
route_segment = "pages"
nav_label = "Pages"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[[provides.admin_ui.child_pages]]
subpath = "all"
title = "All Pages"
nav_label = "All Pages"

[[provides.admin_ui.child_pages]]
subpath = "new"
title = "Add Page"
nav_label = "Add Page"

[provides.storefront_ui]
leptos_crate = "rustok-pages-storefront"
slot = "home_before_footer"
route_segment = "pages"
page_title = "Pages"

[provides.storefront_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "storefront/locales"

[fba.builder_consumer]
provider_module = "page-builder"
contract = "grapesjs_v1"
contract_version = "1.0"
builder_contract_version = "1.0"
consumer_min_version = "1.0"
capabilities = ["preview", "tree", "properties", "publish"]

[fba.builder_consumer.degraded_modes]
builder_disabled = "admin_builder_readonly_fallback"
preview_disabled = "preview_capability_hidden_keep_read_paths"
publish_disabled = "typed_feature_disabled_error_keep_read_paths"

[fba.builder_consumer.error_catalog]
validation = "validation"
sanitize = "sanitize"
runtime = "runtime"
feature_disabled = "feature-disabled"

[fba.builder_consumer.error_codes]
feature_disabled = "FEATURE_DISABLED"

[fba.builder_consumer.degraded_mode_errors]
builder_disabled = "FEATURE_DISABLED"
preview_disabled = "FEATURE_DISABLED"
publish_disabled = "FEATURE_DISABLED"

[fba.builder_consumer.toggle_profiles]
all_on = [
  "builder.enabled=true",
  "builder.preview.enabled=true",
  "builder.properties.enabled=true",
  "builder.publish.enabled=true",
  "builder.legacy_bridge_readonly=true",
]
publish_off = [
  "builder.enabled=true",
  "builder.preview.enabled=true",
  "builder.properties.enabled=true",
  "builder.publish.enabled=false",
  "builder.legacy_bridge_readonly=true",
]
preview_off = [
  "builder.enabled=true",
  "builder.preview.enabled=false",
  "builder.properties.enabled=true",
  "builder.publish.enabled=false",
  "builder.legacy_bridge_readonly=true",
]
builder_off = [
  "builder.enabled=false",
  "builder.preview.enabled=false",
  "builder.properties.enabled=false",
  "builder.publish.enabled=false",
  "builder.legacy_bridge_readonly=true",
]

[fba.builder_consumer.rollout_policy]
audit_trail = "control_plane_builder_wave_audit"
before_snapshot_required = true
after_snapshot_required = true
decision_required = true
owner_signoff_required = true
rollback_without_redeploy_target_minutes = 10
pilot_smoke = "preview -> properties -> publish(dry)"
rollback_triggers = [
  "runtime_error_rate_above_alert_threshold",
  "publish_latency_p95_above_slo_for_10m",
  "sanitize_failures_above_alert_threshold",
  "storefront_published_read_regression",
]
read_surfaces_guarantee = "pages_owned_list_read_menu_paths_stay_available_when_builder_capabilities_are_disabled"
