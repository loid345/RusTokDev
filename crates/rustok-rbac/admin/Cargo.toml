[package]
name = "rustok-rbac-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-rbac module"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "rustok-api/server",
  "dep:leptos_axum",
  "dep:rustok-core",
  "dep:rustok-rbac",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
leptos-auth.workspace = true
rustok-api = { workspace = true, default-features = false }
rustok-core = { workspace = true, optional = true }
rustok-rbac = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }

[package.metadata.cargo-udeps.ignore]
normal = ["rustok-rbac"]
