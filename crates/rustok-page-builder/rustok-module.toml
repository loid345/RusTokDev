[module]
slug = "page_builder"
name = "Page Builder"
version = "0.1.0"
description = "Standalone FBA-first visual page builder reference module"
ownership = "first_party"
trust_level = "verified"
ui_classification = "capability_only"

[crate]
entry_type = "PageBuilderModule"

[fba.provider]
contract = "grapesjs_v1"
builder_contract_version = "1.0"
consumer_min_version = "1.0"
capabilities = ["preview", "tree", "properties", "publish"]
