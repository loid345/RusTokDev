[module]
slug = "fulfillment"
name = "Fulfillment"
version = "0.1.0"
description = "Default fulfillment submodule in the ecommerce family"
ownership = "first_party"
trust_level = "verified"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "FulfillmentModule"

[provides.admin_ui]
leptos_crate = "rustok-fulfillment-admin"
route_segment = "fulfillment"
nav_label = "Fulfillment"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[provides.storefront_ui]
leptos_crate = "rustok-fulfillment-storefront"
slot = "checkout_shipping_handoff"
route_segment = "fulfillment"
page_title = "Fulfillment"
