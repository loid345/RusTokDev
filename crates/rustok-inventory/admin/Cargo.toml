[package]
name = "rustok-inventory-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-inventory module"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "rustok-api/loco-adapter",
  "dep:leptos_axum",
  "dep:loco-rs",
  "dep:rustok-core",
  "dep:rustok-inventory",
  "dep:uuid",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
loco-rs = { workspace = true, optional = true }
rustok-api = { workspace = true, default-features = false }
rustok-core = { workspace = true, optional = true }
rustok-inventory = { workspace = true, optional = true }
leptos-ui-routing.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
uuid = { workspace = true, optional = true }

